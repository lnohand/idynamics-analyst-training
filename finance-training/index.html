<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Training — Michael Bezrukov</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; }</style>
  <script src="quiz_data.js"></script>
  <script src="flashcard_data.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;


const DIFF_COLOR = { beginner: "#22c55e", intermediate: "#f59e0b", advanced: "#ef4444", mixed: "#8b5cf6" };
const DIFF_LABEL = { beginner: "Beginner", intermediate: "Intermediate", advanced: "Advanced", mixed: "Mixed" };

function DiffBadge({ level }) {
  return (
    <span style={{ fontSize: "10px", fontWeight: 700, padding: "2px 8px", borderRadius: "999px",
      background: DIFF_COLOR[level] + "22", color: DIFF_COLOR[level], letterSpacing: "0.05em",
      textTransform: "uppercase", border: `1px solid ${DIFF_COLOR[level]}44` }}>
      {DIFF_LABEL[level]}
    </span>
  );
}

function CustomQuizBuilder({ onClose, onStart }) {
  const [selectedSections, setSelectedSections] = React.useState(
    QUIZ_LIBRARY.map(s => s.id)
  );
  const [difficulty, setDifficulty] = React.useState("all");
  const [count, setCount] = React.useState(20);

  const toggleSection = (id) => {
    setSelectedSections(prev =>
      prev.includes(id) ? prev.filter(s=>s!==id) : [...prev, id]
    );
  };

  const pool = QUIZ_LIBRARY
    .filter(s => selectedSections.includes(s.id))
    .flatMap(s => s.quizzes)
    .filter(q => difficulty === "all" || q.difficulty === difficulty || q.difficulty === "mixed")
    .flatMap(q => q.questions);

  const build = () => {
    if (pool.length === 0) return;
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    const questions = shuffled.slice(0, Math.min(count, pool.length));
    onStart({ id: "custom", title: `Custom Quiz (${questions.length}Q)`, questions });
  };

  const btnStyle = (active, color="#3b82f6") => ({
    padding: "8px 16px", borderRadius: "8px", cursor: "pointer", fontSize: "13px", fontWeight: 600,
    border: `1px solid ${active ? color : "#334155"}`,
    background: active ? color + "22" : "transparent",
    color: active ? color : "#94a3b8", transition: "all 0.15s"
  });

  return (
    <div style={{ flex: 1, overflowY: "auto", padding: "32px 40px", background: "#020817" }}>
      <div style={{ maxWidth: "680px", margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "28px" }}>
          <div style={{ fontSize: "18px", fontWeight: 700, color: "#f1f5f9" }}>Build Custom Quiz</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#cbd5e1", cursor: "pointer", fontSize: "13px" }}>← Back</button>
        </div>

        <div style={{ marginBottom: "24px" }}>
          <div style={{ fontSize: "12px", color: "#475569", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: "12px" }}>Sections</div>
          <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
            {QUIZ_LIBRARY.map(s => (
              <button key={s.id} onClick={() => toggleSection(s.id)}
                style={btnStyle(selectedSections.includes(s.id), s.color)}>
                {s.name}
              </button>
            ))}
          </div>
        </div>

        <div style={{ marginBottom: "24px" }}>
          <div style={{ fontSize: "12px", color: "#475569", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: "12px" }}>Difficulty</div>
          <div style={{ display: "flex", gap: "8px" }}>
            {["all","beginner","intermediate","advanced"].map(d => (
              <button key={d} onClick={() => setDifficulty(d)} style={btnStyle(difficulty===d)}>
                {d.charAt(0).toUpperCase()+d.slice(1)}
              </button>
            ))}
          </div>
        </div>

        <div style={{ marginBottom: "32px" }}>
          <div style={{ fontSize: "12px", color: "#475569", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: "12px" }}>
            Questions: <span style={{ color: "#f1f5f9", fontWeight: 700 }}>{Math.min(count, pool.length)}</span>
            {pool.length < count && <span style={{ color: "#f59e0b" }}> (pool: {pool.length})</span>}
          </div>
          <input type="range" min="5" max="50" value={count}
            onChange={e => setCount(Number(e.target.value))}
            style={{ width: "100%", accentColor: "#3b82f6" }} />
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: "11px", color: "#334155", marginTop: "4px" }}>
            <span>5</span><span>50</span>
          </div>
        </div>

        <button onClick={build} disabled={pool.length===0} style={{
          width: "100%", padding: "14px", borderRadius: "10px", border: "none",
          background: pool.length===0 ? "#1e293b" : "linear-gradient(90deg,#3b82f6,#6366f1)",
          color: pool.length===0 ? "#475569" : "#fff", fontWeight: 700, fontSize: "15px",
          cursor: pool.length===0 ? "not-allowed" : "pointer"
        }}>
          Start Quiz ({Math.min(count, pool.length)} questions)
        </button>
      </div>
    </div>
  );
}

function QuizPlayer({ quiz, onClose }) {
  const [order, setOrder] = React.useState(() => quiz.questions.map((_,i)=>i));
  const [idx, setIdx] = React.useState(0);
  const [flipped, setFlipped] = React.useState(false);
  const [selected, setSelected] = React.useState(null);

  const q = quiz.questions[order[idx]];
  const progress = ((idx + 1) / order.length) * 100;

  const shuffle = () => {
    const a = [...order]; for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    setOrder(a); setIdx(0); setFlipped(false); setSelected(null);
  };
  const restart = () => { setOrder(quiz.questions.map((_,i)=>i)); setIdx(0); setFlipped(false); setSelected(null); };
  const next = () => { if (idx < order.length-1){ setIdx(idx+1); setFlipped(false); setSelected(null); }};
  const prev = () => { if (idx > 0){ setIdx(idx-1); setFlipped(false); setSelected(null); }};
  const flip = () => setFlipped(f => !f);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight') next();
      else if (e.key === 'ArrowLeft') prev();
      else if (e.key === ' ') { e.preventDefault(); flip(); }
      else if (e.key === 's' || e.key === 'S') shuffle();
      else if (e.key === 'r' || e.key === 'R') restart();
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [idx, flipped, order]);

  const cardBg = "#0d1733";
  const borderCol = "#24315d";

  return (
    <div style={{ flex: 1, overflowY: "auto", padding: "32px 40px", background: "#020817" }}>
      <div style={{ maxWidth: "800px", margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" }}>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#cbd5e1", cursor: "pointer", fontSize: "13px" }}>← Back</button>
          <div style={{ fontSize: "16px", fontWeight: 700, color: "#f1f5f9" }}>{quiz.title}</div>
          <div style={{ fontSize: "12px", color: "#475569" }}>Q {idx+1} of {order.length}</div>
        </div>

        <div style={{ height: "6px", background: "#0d1330", borderRadius: "999px", overflow: "hidden", marginBottom: "16px" }}>
          <div style={{ height: "100%", width: `${progress}%`, background: "linear-gradient(90deg,#3b82f6,#6366f1)", transition: "width 0.25s" }} />
        </div>

        <div style={{ display: "flex", gap: "8px", marginBottom: "12px" }}>
          {["Shuffle (S)", "Restart (R)"].map((label, i) => (
            <button key={i} onClick={i===0?shuffle:restart} style={{
              padding: "8px 14px", borderRadius: "8px", border: "1px solid #1e293b",
              background: "#0a0f1e", color: "#cbd5e1", cursor: "pointer", fontSize: "12px"
            }}>{label}</button>
          ))}
        </div>

        {q.type === "flip" ? (
          <div style={{ perspective: "1200px", height: "380px", marginBottom: "16px" }}>
            <div style={{ position: "relative", width: "100%", height: "100%", transformStyle: "preserve-3d",
              transition: "transform 0.5s", transform: flipped ? "rotateY(180deg)" : "none" }}>
              <div style={{ position: "absolute", inset: 0, background: cardBg, border: `1px solid ${borderCol}`,
                borderRadius: "16px", padding: "28px", display: "flex", alignItems: "center",
                backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden" }}>
                <div style={{ fontSize: "18px", fontWeight: 700, lineHeight: 1.4, color: "#eaefff" }}>{q.q}</div>
              </div>
              <div style={{ position: "absolute", inset: 0, background: cardBg, border: `1px solid ${borderCol}`,
                borderRadius: "16px", padding: "28px", overflowY: "auto",
                transform: "rotateY(180deg)", backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden" }}>
                <div style={{ fontSize: "12px", fontWeight: 700, color: "#3b82f6", marginBottom: "10px", textTransform: "uppercase" }}>Model Answer</div>
                <div style={{ fontSize: "17px", lineHeight: 1.7, color: "#cbd5e1", whiteSpace: "pre-wrap" }}>{q.a}</div>
              </div>
            </div>
          </div>
        ) : (
          <div style={{ background: cardBg, border: `1px solid ${borderCol}`, borderRadius: "16px", padding: "28px", marginBottom: "16px" }}>
            <div style={{ fontSize: "17px", fontWeight: 700, color: "#eaefff", marginBottom: "20px", lineHeight: 1.4 }}>{q.q}</div>
            <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
              {q.choices.map((choice, ci) => {
                const isCorrect = ci === q.answer;
                const isSelected = selected === ci;
                let bg = "#0b1330", border = "#1e293b", color = "#94a3b8";
                if (selected !== null) {
                  if (isCorrect) { bg = "#14532d44"; border = "#22c55e"; color = "#22c55e"; }
                  else if (isSelected) { bg = "#7f1d1d44"; border = "#ef4444"; color = "#ef4444"; }
                }
                return (
                  <button key={ci} onClick={() => { if (selected === null) setSelected(ci); }} style={{
                    textAlign: "left", padding: "12px 16px", borderRadius: "10px",
                    cursor: selected===null?"pointer":"default",
                    background: bg, border: `1px solid ${border}`, color, fontSize: "14px", transition: "all 0.15s"
                  }}>
                    <span style={{ fontWeight: 700, marginRight: "10px" }}>{["A","B","C","D"][ci]}.</span>{choice}
                  </button>
                );
              })}
            </div>
            {selected !== null && q.explain && (
              <div style={{ marginTop: "16px", padding: "12px 16px", background: "#0f2744", border: "1px solid #1e3a5f",
                borderRadius: "10px", fontSize: "13px", color: "#93c5fd", lineHeight: 1.6 }}>
                <strong>Explanation:</strong> {q.explain}
              </div>
            )}
          </div>
        )}

        <div style={{ display: "flex", justifyContent: "space-between", gap: "12px" }}>
          <button onClick={prev} disabled={idx===0} style={{
            padding: "10px 24px", borderRadius: "8px", border: "1px solid #1e293b",
            background: "#0a0f1e", color: idx===0?"#475569":"#cbd5e1", cursor: idx===0?"not-allowed":"pointer"
          }}>← Previous</button>
          {q.type === "flip" && (
            <button onClick={flip} style={{
              padding: "10px 24px", borderRadius: "8px", border: "none",
              background: "linear-gradient(90deg,#3b82f6,#6366f1)", color: "#fff", fontWeight: 700, cursor: "pointer"
            }}>Flip (Space)</button>
          )}
          <button onClick={next} disabled={idx===order.length-1} style={{
            padding: "10px 24px", borderRadius: "8px", border: "1px solid #1e293b",
            background: "#0a0f1e", color: idx===order.length-1?"#475569":"#cbd5e1",
            cursor: idx===order.length-1?"not-allowed":"pointer"
          }}>Next →</button>
        </div>
      </div>
    </div>
  );
}

function FinanceTraining() {
  const [activeSection, setActiveSection] = React.useState(QUIZ_LIBRARY[0].id);
  const [activeQuiz, setActiveQuiz] = React.useState(null);
  const [showBuilder, setShowBuilder] = React.useState(false);

  const section = QUIZ_LIBRARY.find(s => s.id === activeSection);
  const DIFF_ORDER = ["beginner", "intermediate", "advanced", "mixed"];
  const sorted = [...section.quizzes].sort((a,b) =>
    DIFF_ORDER.indexOf(a.difficulty) - DIFF_ORDER.indexOf(b.difficulty));

  if (activeQuiz) return <QuizPlayer quiz={activeQuiz} onClose={() => setActiveQuiz(null)} />;
  if (showBuilder) return <CustomQuizBuilder onClose={() => setShowBuilder(false)} onStart={setActiveQuiz} />;

  return (
    <div style={{ flex: 1, overflowY: "auto", padding: "32px 40px", background: "#020817" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "28px" }}>
        <div>
          <div style={{ fontSize: "20px", fontWeight: 700, color: "#f1f5f9" }}>Finance Training</div>
          <div style={{ fontSize: "13px", color: "#64748b", marginTop: "4px" }}>Interview prep · {QUIZ_LIBRARY.reduce((t,s)=>t+s.quizzes.reduce((tt,q)=>tt+q.questions.length,0),0)} questions across {QUIZ_LIBRARY.reduce((t,s)=>t+s.quizzes.length,0)} quizzes</div>
        </div>
        <button onClick={() => setShowBuilder(true)} style={{
          padding: "10px 20px", borderRadius: "8px", border: "none",
          background: "linear-gradient(90deg,#3b82f6,#6366f1)", color: "#fff",
          fontWeight: 700, cursor: "pointer", fontSize: "13px"
        }}>Build Custom Quiz</button>
      </div>

      <div style={{ display: "flex", gap: "8px", marginBottom: "24px", flexWrap: "wrap" }}>
        {QUIZ_LIBRARY.map(s => (
          <button key={s.id} onClick={() => setActiveSection(s.id)} style={{
            padding: "8px 16px", borderRadius: "8px", cursor: "pointer", fontSize: "13px", fontWeight: 600,
            border: `1px solid ${activeSection === s.id ? s.color : "#1e293b"}`,
            background: activeSection === s.id ? s.color + "22" : "transparent",
            color: activeSection === s.id ? s.color : "#94a3b8", transition: "all 0.15s"
          }}>
            {s.name}
            <span style={{ marginLeft: "6px", fontSize: "11px", opacity: 0.7 }}>{s.quizzes.length}</span>
          </button>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: "16px" }}>
        {sorted.map(quiz => (
          <button key={quiz.id} onClick={() => setActiveQuiz(quiz)} style={{
            textAlign: "left", padding: "20px", borderRadius: "12px", cursor: "pointer",
            background: "#0a0f1e", border: "1px solid #1e293b", transition: "border-color 0.15s",
            color: "#e2e8f0"
          }}
          onMouseEnter={e => e.currentTarget.style.borderColor = section.color}
          onMouseLeave={e => e.currentTarget.style.borderColor = "#1e293b"}>
            <div style={{ fontSize: "14px", fontWeight: 600, marginBottom: "10px", lineHeight: 1.3 }}>{quiz.title}</div>
            <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
              <DiffBadge level={quiz.difficulty} />
              <span style={{ fontSize: "11px", color: "#475569" }}>{quiz.questions.length}Q</span>
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

function App() {
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", fontFamily: "Georgia, serif", background: "#020817", color: "#e2e8f0" }}>
      <FinanceTraining />
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
